name: Deploy SeaVigil site to GitHub Pages

# Publishes the static web/ directory (precomputed data is committed). A production
# data refresh would be a SEPARATE scheduled job that pulls fresh GFW data with a
# token in Actions secrets and re-runs seavigil.alert + seavigil.site, then commits
# web/data/. This workflow only deploys what is in web/.

on:
  push:
    branches: [main]
    paths: ["web/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
