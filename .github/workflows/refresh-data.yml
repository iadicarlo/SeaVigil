name: Refresh SeaVigil data (precompute)

# Precompute-and-ship-static: regenerate the incident dossiers + web data on a
# schedule and commit them, so GitHub Pages serves fresh static files with no
# server and no token in the browser.
#
# If a GFW_TOKEN secret is set, the job pulls LIVE GFW Sentinel-1 SAR detections
# (the dark fleet) via seavigil.fetch_gfw and scores against them; otherwise it
# regenerates from the static training labels + the synthetic SAR sample (stable).
# Note: per-position AIS scoring still needs your own AIS/VMS feed (--positions);
# GFW does not publish raw AIS. Enabling the token opts into committing real
# GFW-derived (CC BY-NC, non-commercial) dossiers to this repo.

on:
  schedule:
    - cron: "0 3 1 * *"   # 03:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Regenerate incidents + web data
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
        run: |
          if [ -n "$GFW_TOKEN" ]; then
            echo "GFW_TOKEN present -> pulling live GFW SAR detections (dark fleet)"
            uv run python -m seavigil.fetch_gfw --date-range 2024-01-01,2025-01-01
            uv run python -m seavigil.alert --scope all --sar data/sar/gfw_sar_detections.geojson
          else
            echo "no GFW_TOKEN -> regenerating from training labels + synthetic SAR sample"
            uv run python -m seavigil.alert --scope all --sample-sar
          fi
          uv run python -m seavigil.site
      - name: Commit refreshed data if changed
        run: |
          NAME="seavigil-bot"
          HOST="users.noreply.github.com"
          git config user.name "$NAME"
          git config user.email "${NAME}@${HOST}"
          git add results/incidents web/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: scheduled data refresh"
            git push
          fi
